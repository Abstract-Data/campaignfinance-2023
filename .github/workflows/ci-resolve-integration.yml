name: CI Resolve Integration

# Optional manual gate — Texas data + Postgres when configured.
# Not a PR blocker; see docs/RUNBOOK.md → Phase 0 / resolution manual gate.

on:
  workflow_dispatch:

jobs:
  resolve-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run resolve integration tests
        run: >
          uv run pytest tests/resolve -m integration -v --tb=short
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
