name: CI Resolve Tests

on:
  workflow_call:

jobs:
  resolve-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      # Splink is pinned to 4.0.16 in pyproject.toml — update intentionally, not automatically
      - name: Verify Splink version
        run: uv run python -c "import splink; print('Splink:', splink.__version__)"

      - name: Run resolve tests
        run: >
          uv run pytest tests/resolve -m "not integration" -v --tb=short
        env:
          PYTHONPATH: .
