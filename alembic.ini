# Alembic configuration for campaignfinance.
#
# The database URL is NOT set here — migrations/env.py resolves it at runtime from the same
# source the app uses (PostgresConfig / an explicit override), so `alembic` and `cf load` always
# target the same database. Run migrations with:  uv run alembic upgrade head
[alembic]
script_location = migrations
prepend_sys_path = .
# Use a path-safe slug + a UTC timestamp prefix so revisions sort chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
